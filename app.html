<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Canvas Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <div id="header">
        <h1>Air Canvas Pro</h1>
        <p>Draw with index finger • Erase with open palm</p>
    </div>
    
    <div id="controls">
        <div class="control-group">
            <label for="color-picker">Brush Color:</label>
            <input type="color" id="color-picker" value="#00ff88">
        </div>
        <div class="control-group">
            <label for="brush-size">Brush Size:</label>
            <input type="range" id="brush-size" min="1" max="50" value="8">
            <span id="size-value">8px</span>
        </div>
        <div class="control-group">
            <button id="clear-btn">Clear All</button>
            <button id="undo-btn">Undo</button>
            <button id="save-btn">Save Drawing</button>
        </div>
        <div class="control-group">
            <button id="camera-toggle">Show Camera</button>
            <button id="home-btn" onclick="location.href='landing.html'" style="background: linear-gradient(45deg, #00ccff, #0099ff);">Back to Home</button>
        </div>
    </div>
    
    <div id="status">
        <span id="gesture-status">Ready</span>
    </div>

    <!-- HUD Camera Preview -->
    <div id="hud-container">
        <div id="hud-wrapper">
            <canvas id="hud-canvas"></canvas>
            <div id="hud-frame"></div>
            <div id="hud-crosshair"></div>
            <div class="hud-corner hud-corner-tl"></div>
            <div class="hud-corner hud-corner-tr"></div>
            <div class="hud-corner hud-corner-bl"></div>
            <div class="hud-corner hud-corner-br"></div>
            <div id="hud-status">
                <div class="hud-status-item">
                    <span class="hud-label">CAM</span>
                    <span id="cam-status" class="hud-value">●</span>
                </div>
                <div class="hud-status-item">
                    <span class="hud-label">LIGHT</span>
                    <span id="light-status" class="hud-value">●</span>
                </div>
                <div class="hud-status-item">
                    <span class="hud-label">HAND</span>
                    <span id="hand-status" class="hud-value">●</span>
                </div>
            </div>
            <button id="hud-toggle" title="Toggle camera HUD">⊕</button>
        </div>
    </div>
    
    <script src="sketch.js"></script>
</body>
</html>
